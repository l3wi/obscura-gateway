name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build --release --locked --bins --target ${{ matrix.target }}

      - name: Package assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          bin_dir="target/${target}/release"
          dist_dir="dist"
          exe=""

          if [[ "${target}" == *windows* ]]; then
            exe=".exe"
          fi

          mkdir -p "${dist_dir}/obscura-cli-${version}-${target}"
          cp "${bin_dir}/obscura-cli${exe}" "${dist_dir}/obscura-cli-${version}-${target}/"
          cp README.md "${dist_dir}/obscura-cli-${version}-${target}/"
          tar -C "${dist_dir}" -czf "${dist_dir}/obscura-cli-${version}-${target}.tar.gz" "obscura-cli-${version}-${target}"

          mkdir -p "${dist_dir}/obscura-gateway-${version}-${target}"
          cp "${bin_dir}/obscura-gateway${exe}" "${dist_dir}/obscura-gateway-${version}-${target}/"
          cp "${bin_dir}/obscura-cli${exe}" "${dist_dir}/obscura-gateway-${version}-${target}/"
          cp README.md DOCKER.md "${dist_dir}/obscura-gateway-${version}-${target}/"
          tar -C "${dist_dir}" -czf "${dist_dir}/obscura-gateway-${version}-${target}.tar.gz" "obscura-gateway-${version}-${target}"

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
