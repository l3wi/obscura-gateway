name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build --release --locked --bins --target ${{ matrix.target }}

      - name: Package assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          bin_dir="target/${target}/release"
          dist_dir="dist"

          mkdir -p "${dist_dir}/obscura-cli-${version}-${target}"
          cp "${bin_dir}/obscura-cli" "${dist_dir}/obscura-cli-${version}-${target}/"
          cp README.md "${dist_dir}/obscura-cli-${version}-${target}/"
          tar -C "${dist_dir}" -czf "${dist_dir}/obscura-cli-${version}-${target}.tar.gz" "obscura-cli-${version}-${target}"

          mkdir -p "${dist_dir}/obscura-gateway-${version}-${target}"
          cp "${bin_dir}/obscura-gateway" "${dist_dir}/obscura-gateway-${version}-${target}/"
          cp "${bin_dir}/obscura-cli" "${dist_dir}/obscura-gateway-${version}-${target}/"
          cp README.md DOCKER.md "${dist_dir}/obscura-gateway-${version}-${target}/"
          tar -C "${dist_dir}" -czf "${dist_dir}/obscura-gateway-${version}-${target}.tar.gz" "obscura-gateway-${version}-${target}"

          (cd "${dist_dir}" && sha256sum *.tar.gz > SHA256SUMS)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
